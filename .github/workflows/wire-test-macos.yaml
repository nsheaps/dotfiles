name: wire-test-macos

# wire-test.yaml's ubuntu job runs a modern bash, so it can't catch
# regressions that only bite bash 3.2 — which is exactly what the Homebrew
# wrapper runs under on macOS (its `#!/bin/bash` resolves to Apple's frozen
# 3.2.57: no `mapfile`, and `set -u` errors on empty-array expansion). Invoke
# the CLI explicitly via /bin/bash against a throwaway $HOME so this class of
# bug is covered. No Homebrew needed — the hosted runner's system bash is
# enough.
#
# macOS runners cost far more than Linux ones, so this only runs on an
# explicit workflow_dispatch, or when the PR carries the `test-macos` label
# — checked directly below from the pull_request event payload, which is why
# this triggers on pull_request rather than push: a plain push event carries
# no PR/label information at all, so there'd be nothing to gate on.

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  wire-test-macos:
    if: github.event_name == 'workflow_dispatch' || contains(github.event.pull_request.labels.*.name, 'test-macos')
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Show system bash version
        run: /bin/bash --version | head -1

      - name: First wire (non-interactive, system /bin/bash)
        run: |
          set -eux
          export HOME="$RUNNER_TEMP/fake-home"
          mkdir -p "$HOME"
          # `defaults write` (used to set the default iTerm2 profile) targets
          # the real runner user's preference domain by UID, not $HOME, so it
          # can't be sandboxed into fake-home like everything else this job
          # tests. Skip it here rather than mutate the runner's real plist.
          export DOTFILES_SKIP_ITERM_DEFAULT=1
          /bin/bash ./bin/dotfiles wire --yes

      - name: Check after first wire
        run: |
          set -eux
          export HOME="$RUNNER_TEMP/fake-home"
          /bin/bash ./bin/dotfiles check
          test -L "$HOME/.dotfiles"
          test -L "$HOME/.profile.d"
          grep -q '# BEGIN: Managed by dotfiles wire' "$HOME/.zshrc"
          grep -q '# BEGIN: Managed by dotfiles wire' "$HOME/.zshenv"
          grep -q '# BEGIN: Managed by dotfiles wire' "$HOME/.zprofile"

      - name: Re-wire (idempotency, system /bin/bash)
        run: |
          set -eux
          export HOME="$RUNNER_TEMP/fake-home"
          export DOTFILES_SKIP_ITERM_DEFAULT=1
          /bin/bash ./bin/dotfiles wire --yes

      - name: Check after re-wire
        run: |
          set -eux
          export HOME="$RUNNER_TEMP/fake-home"
          /bin/bash ./bin/dotfiles check
          for rc in .zshrc .zshenv .zprofile; do
            begins=$(grep -c '# BEGIN: Managed by dotfiles wire' "$HOME/$rc")
            ends=$(grep -c '# END: Managed by dotfiles wire' "$HOME/$rc")
            echo "$rc: $begins begin marker(s), $ends end marker(s)"
            test "$begins" -eq 1
            test "$ends" -eq 1
          done
