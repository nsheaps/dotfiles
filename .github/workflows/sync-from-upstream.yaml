name: Sync from upstream (nsheaps/dotfiles)

# Manual-only sync of this repo from its personal-account upstream
# (nsheaps/dotfiles), via the reusable workflow in nsheaps-oura/github-actions.
# Deliberately workflow_dispatch-only (no schedule, no push trigger) — pulling
# in upstream changes is a decision made by a human, not an automatic drift.
#
# Config: .gitupstream (cross_repo_sync section) at repo root.
# Upstream (nsheaps/dotfiles) is public, so no upstream_token secret is
# needed here. If this pattern is reused for a private upstream, add an
# `upstream_token` secret containing a token with read access to it.

on:
  workflow_dispatch:
    inputs:
      test_mode:
        description: "Dry run — don't push"
        type: boolean
        default: false

jobs:
  sync:
    uses: nsheaps-oura/github-actions/.github/workflows/sync-repo-from-upstream.yaml@main
    with:
      test_mode: ${{ inputs.test_mode || false }}
