name: check

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref == 'refs/heads/main' && github.sha || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install shfmt
        run: |
          # ubuntu-latest ships shellcheck but not shfmt; install a pinned
          # release so the `shfmt check` step has the binary on PATH.
          SHFMT_VERSION=v3.10.0
          mkdir -p "$HOME/.local/bin"
          curl -fsSL -o "$HOME/.local/bin/shfmt" \
            "https://github.com/mvdan/sh/releases/download/${SHFMT_VERSION}/shfmt_${SHFMT_VERSION}_linux_amd64"
          chmod +x "$HOME/.local/bin/shfmt"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/shfmt" --version

      - name: Find bash scripts
        id: find-bash
        run: |
          # Collect .sh files with bash shebangs + standalone bash scripts in bin/
          bash_files=""
          for f in $(find . -name '*.sh' -not -path './.git/*' -not -path './.dev/*'); do
            shebang=$(head -1 "$f")
            if echo "$shebang" | grep -qE '(bash|^#!/bin/sh)'; then
              bash_files="$bash_files $f"
            fi
          done
          # Also check bin/ scripts without .sh extension
          for f in $(find ./bin -maxdepth 1 -type f -not -name '*.sh' -not -path './.git/*'); do
            shebang=$(head -1 "$f")
            if echo "$shebang" | grep -qE '(bash|^#!/bin/sh)'; then
              bash_files="$bash_files $f"
            fi
          done
          # Also check _home/.local/bin/ scripts without .sh extension (the
          # ones `ensure_local_bin` actually links onto PATH — e.g. gh-user)
          for f in $(find ./_home/.local/bin -maxdepth 1 -type f -not -name '*.sh' -not -path './.git/*'); do
            shebang=$(head -1 "$f")
            if echo "$shebang" | grep -qE '(bash|^#!/bin/sh)'; then
              bash_files="$bash_files $f"
            fi
          done
          # Also check internal/ shell config files (bashrc, bash_profile)
          for f in ./internal/bashrc ./internal/bash_profile; do
            if [[ -f "$f" ]]; then
              shebang=$(head -1 "$f")
              if echo "$shebang" | grep -qE '(bash|^#!/bin/sh)'; then
                bash_files="$bash_files $f"
              fi
            fi
          done
          echo "files=$bash_files" >> "$GITHUB_OUTPUT"
          echo "Found bash files:$bash_files"

      - name: ShellCheck
        if: steps.find-bash.outputs.files != ''
        run: |
          bash_files="${{ steps.find-bash.outputs.files }}"
          echo "Running ShellCheck on:$bash_files"
          shellcheck $bash_files

      - name: shfmt check
        if: steps.find-bash.outputs.files != ''
        run: |
          bash_files="${{ steps.find-bash.outputs.files }}"
          echo "Running shfmt on:$bash_files"
          # -d shows diff; indent settings sourced from .editorconfig
          shfmt -d $bash_files

      - name: EditorConfig check
        uses: editorconfig-checker/action-editorconfig-checker@main

      - name: Run editorconfig-checker
        run: editorconfig-checker
