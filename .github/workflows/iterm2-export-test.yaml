name: iterm2-export-test

# Regression test for bin/iterm2-export-profiles.py: runs it against a small
# checked-in fixture plist (bin/testdata/sample-iterm2-prefs.plist) and
# asserts the JSON it writes has the shape/content Dynamic Profiles expects.
# Never touches a real iTerm2 preferences file.

on:
  pull_request:
    paths:
      - "bin/iterm2-export-profiles.py"
      - "bin/testdata/sample-iterm2-prefs.plist"
      - ".github/workflows/iterm2-export-test.yaml"
  push:
    branches: [main]
    paths:
      - "bin/iterm2-export-profiles.py"
      - "bin/testdata/sample-iterm2-prefs.plist"
      - ".github/workflows/iterm2-export-test.yaml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref == 'refs/heads/main' && github.sha || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  iterm2-export-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Export the fixture plist (default: excludes Guid DEFAULT)
        run: |
          set -eux
          python3 bin/iterm2-export-profiles.py \
            --plist bin/testdata/sample-iterm2-prefs.plist \
            --output /tmp/exported-profiles.json

      - name: Assert Default (Guid DEFAULT) is excluded by default
        run: |
          set -eux
          python3 - <<'PYEOF'
          import json

          with open("/tmp/exported-profiles.json") as f:
              data = json.load(f)

          assert list(data.keys()) == ["Profiles"], data.keys()
          profiles = data["Profiles"]
          assert len(profiles) == 1, profiles

          by_name = {p["Name"]: p for p in profiles}
          assert set(by_name) == {"sample-profile"}, by_name

          sample = by_name["sample-profile"]
          assert sample["Guid"] == "sample-profile-guid-001"
          assert sample["Normal Font"] == "Monaco 12"
          assert sample["Non Ascii Font"] == "Monaco 12"
          assert sample["Horizontal Spacing"] == 1.0
          assert sample["Vertical Spacing"] == 1.0

          # The top-level "SomeUnrelatedTopLevelKey" in the fixture plist must
          # not leak into the export -- only "New Bookmarks" is exported.
          assert "SomeUnrelatedTopLevelKey" not in data

          print("OK: Guid DEFAULT excluded, sample-profile shape correct")
          PYEOF

      - name: Export the fixture plist with --include-default
        run: |
          set -eux
          python3 bin/iterm2-export-profiles.py \
            --plist bin/testdata/sample-iterm2-prefs.plist \
            --output /tmp/exported-profiles-with-default.json \
            --include-default

      - name: Assert --include-default brings Default back
        run: |
          set -eux
          python3 - <<'PYEOF'
          import json

          with open("/tmp/exported-profiles-with-default.json") as f:
              data = json.load(f)

          profiles = data["Profiles"]
          assert len(profiles) == 2, profiles

          by_name = {p["Name"]: p for p in profiles}
          assert set(by_name) == {"Default", "sample-profile"}, by_name

          default = by_name["Default"]
          assert default["Guid"] == "DEFAULT"
          assert default["Columns"] == 80
          assert default["Rows"] == 25
          assert default["Normal Font"] == "Monaco 12"

          print("OK: --include-default restores the Default profile")
          PYEOF

      - name: Assert output is valid, sorted-key JSON (stable diffs)
        run: |
          set -eux
          python3 - <<'PYEOF'
          import json

          with open("/tmp/exported-profiles.json") as f:
              raw = f.read()
              data = json.loads(raw)

          resorted = json.dumps(data, indent=2, sort_keys=True) + "\n"
          assert raw == resorted, "exported JSON keys are not sorted"
          print("OK: exported JSON keys are sorted")
          PYEOF
