name: wire-test

# Exercise `dotfiles wire` / `dotfiles check` end-to-end on a clean Ubuntu
# container: wire a fresh $HOME, verify it reports wired, then wire a SECOND
# time and verify it is still wired and idempotent (no duplicated managed
# sections). A bare ubuntu:24.04 image (rather than the pre-populated hosted
# runner) gives an empty $HOME, which is the closest CI analogue to a fresh
# machine right after the Homebrew formula's post_install runs `ensure-wired`.

on:
  push:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref == 'refs/heads/main' && github.sha || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  wire-test:
    runs-on: ubuntu-latest
    container:
      image: ubuntu:24.04
    steps:
      - name: Install prerequisites
        run: |
          # The minimal ubuntu image ships bash + coreutils + grep + sed, but
          # not the tools dotfiles (and actions/checkout) rely on: git for the
          # checkout, findutils/diffutils/gawk for wire's symlink + managed
          # section logic, and ca-certificates for the clone over HTTPS.
          set -eux
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            git ca-certificates findutils diffutils gawk
          bash --version | head -1

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: First wire (non-interactive)
        run: ./bin/dotfiles wire --yes

      - name: Check after first wire
        run: |
          set -eux
          # `check` exits non-zero if $HOME is not fully wired.
          ./bin/dotfiles check
          # Belt-and-suspenders: prove the wiring actually landed.
          test -L "$HOME/.dotfiles"
          test -L "$HOME/.profile.d"
          grep -q '# BEGIN: Managed by dotfiles wire' "$HOME/.zshrc"
          grep -q '# BEGIN: Managed by dotfiles wire' "$HOME/.zshenv"
          grep -q '# BEGIN: Managed by dotfiles wire' "$HOME/.zprofile"

      - name: Re-wire (idempotency)
        run: ./bin/dotfiles wire --yes

      - name: Check after re-wire
        run: |
          set -eux
          # Still wired after a second run.
          ./bin/dotfiles check
          # Re-wiring must REPLACE the managed section in place, not append a
          # second one: exactly one BEGIN/END marker pair per rc file.
          for rc in .zshrc .zshenv .zprofile; do
            begins=$(grep -c '# BEGIN: Managed by dotfiles wire' "$HOME/$rc")
            ends=$(grep -c '# END: Managed by dotfiles wire' "$HOME/$rc")
            echo "$rc: $begins begin marker(s), $ends end marker(s)"
            test "$begins" -eq 1
            test "$ends" -eq 1
          done
