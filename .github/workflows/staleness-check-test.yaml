name: staleness-check-test

# Exercise `dotfiles staleness-check` against synthetic git repos: a repo
# up to date with its "origin", one on the wrong branch, one with a detached
# HEAD, one behind origin as of the last fetch, one with uncommitted changes,
# and one with unpushed commits. Also covers the once-per-interval rate
# limiting and the two escape hatches (DOTFILES_SKIP_STALENESS_CHECK, --force).

on:
  push:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref == 'refs/heads/main' && github.sha || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  staleness-check-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Build synthetic origin + clone
        run: |
          set -eux
          git config --global user.email "test@example.com"
          git config --global user.name "test"

          work="$RUNNER_TEMP/staleness"
          mkdir -p "$work"
          git init --bare -q -b main "$work/origin.git"

          git clone -q "$work/origin.git" "$work/seed"
          git -C "$work/seed" commit -q --allow-empty -m init
          git -C "$work/seed" push -q -u origin main
          rm -rf "$work/seed"

          git clone -q "$work/origin.git" "$work/repo"
          # staleness-check treats a valid $DOTFILES_DIR as one with an
          # _home/ directory (see resolve_dotfiles_dir in bin/dotfiles).
          mkdir -p "$work/repo/_home"

          echo "STALENESS_WORK=$work" >> "$GITHUB_ENV"

      - name: Up to date on main -> silent, exit 0
        run: |
          set -eux
          out="$(DOTFILES_DIR="$STALENESS_WORK/repo" DOTFILES_STALENESS_STATE_FILE="$STALENESS_WORK/state-a" ./bin/dotfiles staleness-check --force 2>&1)"
          test -z "$out"

      - name: Uncommitted changes -> warns and suggests dotfiles sync
        run: |
          set -eux
          git clone -q "$STALENESS_WORK/origin.git" "$STALENESS_WORK/repo-dirty"
          mkdir -p "$STALENESS_WORK/repo-dirty/_home"
          echo "local edit" >"$STALENESS_WORK/repo-dirty/notes.txt"
          out="$(DOTFILES_DIR="$STALENESS_WORK/repo-dirty" DOTFILES_STALENESS_STATE_FILE="$STALENESS_WORK/state-dirty" ./bin/dotfiles staleness-check --force 2>&1)"
          echo "$out"
          echo "$out" | grep -q "has uncommitted changes"
          echo "$out" | grep -q "dotfiles sync"

      - name: Unpushed commit -> warns and suggests dotfiles sync
        run: |
          set -eux
          git clone -q "$STALENESS_WORK/origin.git" "$STALENESS_WORK/repo-ahead"
          mkdir -p "$STALENESS_WORK/repo-ahead/_home"
          git -C "$STALENESS_WORK/repo-ahead" commit -q --allow-empty -m "local-only commit"
          out="$(DOTFILES_DIR="$STALENESS_WORK/repo-ahead" DOTFILES_STALENESS_STATE_FILE="$STALENESS_WORK/state-ahead" ./bin/dotfiles staleness-check --force 2>&1)"
          echo "$out"
          echo "$out" | grep -q "has 1 unpushed commit(s)"
          echo "$out" | grep -q "dotfiles sync"

      - name: Uncommitted changes AND unpushed commit -> combined warning
        run: |
          set -eux
          git clone -q "$STALENESS_WORK/origin.git" "$STALENESS_WORK/repo-dirty-ahead"
          mkdir -p "$STALENESS_WORK/repo-dirty-ahead/_home"
          git -C "$STALENESS_WORK/repo-dirty-ahead" commit -q --allow-empty -m "local-only commit"
          echo "local edit" >"$STALENESS_WORK/repo-dirty-ahead/notes.txt"
          out="$(DOTFILES_DIR="$STALENESS_WORK/repo-dirty-ahead" DOTFILES_STALENESS_STATE_FILE="$STALENESS_WORK/state-dirty-ahead" ./bin/dotfiles staleness-check --force 2>&1)"
          echo "$out"
          echo "$out" | grep -q "has uncommitted changes and 1 unpushed commit(s)"

      - name: On a feature branch -> warns with branch name
        run: |
          set -eux
          git -C "$STALENESS_WORK/repo" checkout -q -b feature-branch
          out="$(DOTFILES_DIR="$STALENESS_WORK/repo" DOTFILES_STALENESS_STATE_FILE="$STALENESS_WORK/state-b" ./bin/dotfiles staleness-check --force 2>&1)"
          git -C "$STALENESS_WORK/repo" checkout -q main
          echo "$out"
          echo "$out" | grep -q "feature-branch instead of 'main'"

      - name: Detached HEAD -> warns
        run: |
          set -eux
          git -C "$STALENESS_WORK/repo" checkout -q --detach
          out="$(DOTFILES_DIR="$STALENESS_WORK/repo" DOTFILES_STALENESS_STATE_FILE="$STALENESS_WORK/state-c" ./bin/dotfiles staleness-check --force 2>&1)"
          git -C "$STALENESS_WORK/repo" checkout -q main
          echo "$out"
          echo "$out" | grep -q "detached HEAD instead of 'main'"

      - name: Behind origin, but only after fetching -> compares against last fetch, not live remote
        run: |
          set -eux
          git clone -q "$STALENESS_WORK/origin.git" "$STALENESS_WORK/pusher"
          git -C "$STALENESS_WORK/pusher" commit -q --allow-empty -m second
          git -C "$STALENESS_WORK/pusher" push -q origin main
          rm -rf "$STALENESS_WORK/pusher"

          # Before fetching, the repo's cached origin/main is still the old
          # commit, so it still looks up to date -- no network call is made.
          out="$(DOTFILES_DIR="$STALENESS_WORK/repo" DOTFILES_STALENESS_STATE_FILE="$STALENESS_WORK/state-d1" ./bin/dotfiles staleness-check --force 2>&1)"
          test -z "$out"

          git -C "$STALENESS_WORK/repo" fetch -q origin
          out="$(DOTFILES_DIR="$STALENESS_WORK/repo" DOTFILES_STALENESS_STATE_FILE="$STALENESS_WORK/state-d2" ./bin/dotfiles staleness-check --force 2>&1)"
          echo "$out"
          echo "$out" | grep -q "1 commit(s) behind origin/main"

      - name: Rate limiting -- silent and state-file-stable within the interval
        run: |
          set -eux
          state="$STALENESS_WORK/state-e"
          rm -f "$state"

          # First call (forced) warns (repo is still behind from the previous
          # step) and stamps the state file.
          DOTFILES_DIR="$STALENESS_WORK/repo" DOTFILES_STALENESS_STATE_FILE="$state" ./bin/dotfiles staleness-check --force >/dev/null 2>&1
          test -f "$state"
          t1="$(cat "$state")"

          # A second, unforced call within the interval must be silent and
          # must NOT touch the state file.
          out="$(DOTFILES_DIR="$STALENESS_WORK/repo" DOTFILES_STALENESS_STATE_FILE="$state" ./bin/dotfiles staleness-check 2>&1)"
          t2="$(cat "$state")"
          test -z "$out"
          test "$t1" = "$t2"

          # Shrinking the interval to 0 makes an unforced call check again.
          out="$(DOTFILES_DIR="$STALENESS_WORK/repo" DOTFILES_STALENESS_STATE_FILE="$state" DOTFILES_STALENESS_CHECK_INTERVAL=0 ./bin/dotfiles staleness-check 2>&1)"
          echo "$out" | grep -q "commit(s) behind origin/main"

      - name: DOTFILES_SKIP_STALENESS_CHECK disables entirely
        run: |
          set -eux
          out="$(DOTFILES_DIR="$STALENESS_WORK/repo" DOTFILES_STALENESS_STATE_FILE="$STALENESS_WORK/state-f" DOTFILES_SKIP_STALENESS_CHECK=1 ./bin/dotfiles staleness-check --force 2>&1)"
          test -z "$out"
          test ! -f "$STALENESS_WORK/state-f"

      - name: Non-git DOTFILES_DIR (e.g. Homebrew tarball install) -> silent no-op
        run: |
          set -eux
          mkdir -p "$STALENESS_WORK/nongit/_home"
          out="$(DOTFILES_DIR="$STALENESS_WORK/nongit" DOTFILES_STALENESS_STATE_FILE="$STALENESS_WORK/state-g" ./bin/dotfiles staleness-check --force 2>&1)"
          test -z "$out"

  # As in wire-test.yaml: also exercise the CLI under macOS's system
  # /bin/bash (frozen at 3.2, no mapfile, set -u errors on empty-array
  # expansion) since that's what the Homebrew wrapper actually runs under.
  staleness-check-test-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Show system bash version
        run: /bin/bash --version | head -1

      - name: Build synthetic origin + clone, behind by one commit
        run: |
          set -eux
          git config --global user.email "test@example.com"
          git config --global user.name "test"

          work="$RUNNER_TEMP/staleness"
          mkdir -p "$work"
          git init --bare -q -b main "$work/origin.git"

          git clone -q "$work/origin.git" "$work/seed"
          git -C "$work/seed" commit -q --allow-empty -m init
          git -C "$work/seed" push -q -u origin main
          rm -rf "$work/seed"

          git clone -q "$work/origin.git" "$work/repo"
          mkdir -p "$work/repo/_home"

          echo "STALENESS_WORK=$work" >> "$GITHUB_ENV"

      - name: Up to date on main, system /bin/bash -> silent
        run: |
          set -eux
          out="$(DOTFILES_DIR="$STALENESS_WORK/repo" DOTFILES_STALENESS_STATE_FILE="$STALENESS_WORK/state-a" /bin/bash ./bin/dotfiles staleness-check --force 2>&1)"
          test -z "$out"

      - name: Detached HEAD, system /bin/bash -> warns without tripping `set -u` on bash 3.2
        run: |
          set -eux
          git -C "$STALENESS_WORK/repo" checkout -q --detach
          out="$(DOTFILES_DIR="$STALENESS_WORK/repo" DOTFILES_STALENESS_STATE_FILE="$STALENESS_WORK/state-b" /bin/bash ./bin/dotfiles staleness-check --force 2>&1)"
          echo "$out"
          echo "$out" | grep -q "detached HEAD instead of 'main'"
